services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wiseeff
      POSTGRES_PASSWORD: wiseeff
      POSTGRES_DB: wiseeff
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - wiseeff-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiseeff -d wiseeff"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  wiseeff-postgres-data:
