$id: wiseeff/nodename-battery-checker.yaml
title: battery_checker
source: vendor
lifecycle: active
version: 1
schemaNamespace: vendor/nodename/battery_checker
nodename:
  - battery_checker
commonRefs:
  - wiseeff/common-status.yaml
properties:
  matchable:
    valueShape: phandle-list
    exampleValue: <&fm1230 &t91407>
    constraints: {}
    documentation: battery_checker 的 DTS 属性「matchable」（matchable），用于驱动读取的设备树配置。
  spare-cycles:
    valueShape: u32-array
    exampleValue: <150>
    constraints: {}
    documentation: battery_checker 的 DTS 属性「spare cycles」（spare-cycles），用于驱动读取的设备树配置。
  status:
    valueShape: string-list
    exampleValue: "\"ok\""
    constraints: {}
    documentation: 节点启用状态（如 okay / disabled），控制该设备是否参与探测。
