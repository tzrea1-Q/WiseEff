%YAML 1.2
---
$schema: http://devicetree.org/meta-schemas/core.yaml#
$id: http://devicetree.org/schemas/vendor/wiseeff/wiseeff-gpio7.yaml#
title: wiseeff,gpio7
description: WiseEff vendor binding for wiseeff,gpio7 (generated from vendor property schema).
maintainers:
  - WiseEff
allOf:
  - $ref: /schemas/device.yaml#
select:
  properties:
    compatible:
      contains:
        const: wiseeff,gpio7
  required:
    - compatible
properties:
  compatible:
    type: string
    pattern: ^wiseeff,gpio7$
  gpio-controller: true
  '#gpio-cells':
    $ref: /schemas/types.yaml#/definitions/uint32-array
    minItems: 1
    maxItems: 1
  status:
    type: string
    enum:
      - okay
      - disabled
      - reserved
      - fail
required:
  - compatible
  - status
additionalProperties: false
unevaluatedProperties: false
