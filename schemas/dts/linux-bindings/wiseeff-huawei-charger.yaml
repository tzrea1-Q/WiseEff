%YAML 1.2
---
$schema: http://devicetree.org/meta-schemas/core.yaml#
$id: http://devicetree.org/schemas/vendor/wiseeff/wiseeff-huawei-charger.yaml#
title: wiseeff,huawei_charger
description: WiseEff vendor binding for wiseeff,huawei_charger (generated from vendor property schema).
maintainers:
  - WiseEff
allOf:
  - $ref: /schemas/device.yaml#
  - $ref: http://devicetree.org/schemas/vendor/wiseeff/common-status.yaml#
select:
  properties:
    compatible:
      contains:
        const: wiseeff,huawei_charger
  required:
    - compatible
properties:
  compatible:
    type: string
    pattern: ^wiseeff,huawei_charger$
  charge_done_sleep_enabled:
    $comment: needs-review:bool
  recharge_para:
    $ref: /schemas/types.yaml#/definitions/uint32-array
  status:
    type: string
  support_new_pd_process:
    $ref: /schemas/types.yaml#/definitions/uint32-array
  weak_source_sleep_enabled:
    $comment: needs-review:bool
required:
  - compatible
  - status
additionalProperties: false
unevaluatedProperties: false
