global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: wiseeff
    environment: self-hosted

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: wiseeff-api
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - api:8787
        labels:
          component: api

  # The worker target is reserved for the durable queue runtime that exposes
  # worker/process metrics on the private operations network.
  - job_name: wiseeff-worker
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - wiseeff-worker:8788
        labels:
          component: worker

  # Optional exporters. Enable these targets only when the matching exporter
  # containers are attached to the private self-hosted compose network.
  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          component: postgres

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          component: host

  - job_name: caddy
    static_configs:
      - targets:
          - proxy:2019
        labels:
          component: proxy
