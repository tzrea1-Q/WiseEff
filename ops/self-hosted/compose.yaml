version: "3.8"

x-wiseeff-build: &wiseeff-build
  context: ../..
  dockerfile: ops/self-hosted/Dockerfile
  args:
    VITE_WISEEFF_RUNTIME_MODE: api
    VITE_WISEEFF_API_BASE_URL: ${VITE_WISEEFF_API_BASE_URL:?set VITE_WISEEFF_API_BASE_URL in ops/self-hosted/.env}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: wiseeff
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in ops/self-hosted/.env}
      POSTGRES_DB: wiseeff
    volumes:
      - wiseeff-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiseeff -d wiseeff"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - wiseeff-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in ops/self-hosted/.env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in ops/self-hosted/.env}
    volumes:
      - wiseeff-minio-data:/data
    expose:
      - "9000"
      - "9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done &&
      mc mb --ignore-existing local/wiseeff &&
      mc mb --ignore-existing local/wiseeff-restore &&
      exit 0
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: "no"

  api:
    build: *wiseeff-build
    restart: unless-stopped
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      LOG_WORKER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    expose:
      - "8787"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8787/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
    command: ["sh", "-lc", "npm run db:migrate && npx tsx server/index.ts"]

  worker:
    build: *wiseeff-build
    restart: unless-stopped
    env_file: .env
    environment:
      LOG_WORKER_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      api:
        condition: service_started
    command: ["sh", "-lc", "npm run worker:logs"]

  web:
    build: *wiseeff-build
    restart: unless-stopped
    env_file: .env
    environment:
      VITE_WISEEFF_RUNTIME_MODE: api
      VITE_WISEEFF_API_BASE_URL: ${VITE_WISEEFF_API_BASE_URL}
    expose:
      - "5173"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 12
    command: ["sh", "-lc", "npm run preview -- --host 0.0.0.0 --port 5173 --strictPort"]

  proxy:
    image: caddy:2-alpine
    init: true
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
      - ./bridge-artifacts:/bridge-artifacts:ro
      - ./bridge-tool-artifacts:/bridge-tool-artifacts:ro
      - wiseeff-caddy-data:/data
      - wiseeff-caddy-config:/config
    healthcheck:
      # Use Caddy admin over plain HTTP to avoid BusyBox wget → ssl_client zombie leak
      # when HTTP→HTTPS redirects would otherwise force an HTTPS fetch (see busybox #15967).
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  wiseeff-postgres-data:
  wiseeff-redis-data:
  wiseeff-minio-data:
  wiseeff-caddy-data:
  wiseeff-caddy-config:
