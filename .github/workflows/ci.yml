name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Documentation governance
        run: npm run docs:check

      - name: Frontend tests
        run: npm test

      - name: Backend tests
        run: npm run test:server

      - name: M2 E2E gate
        run: echo "Run npm run test:m2 locally or in staging with DATABASE_URL, OBJECT_STORE_ROOT, db:migrate, db:seed:m0, db:seed:m1, and db:seed:m2. CI does not run Playwright by default because this workflow has no PostgreSQL service."
